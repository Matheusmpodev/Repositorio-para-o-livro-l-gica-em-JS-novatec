<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa caixa de loja</title>
</head>
<body>
    <h1>Programa caixa de loja</h1>
    <form>
        <p>Data de Vencimento: <input type="date" name="inDataVenc" id="inDataVenc"></p>
        <p>Valor da Conta R$: <input type="number" name="inValor" id="inValor" class="alinha-direita" required> <input type="submit" value="Calcular Multa e juros"></p>
        <p>Valor da Multa R$: <input type="number" name="outMulta" id="outMulta" class="alinha-direita" readonly></p>
        <p>Valor dos Juros R$.: <input type="number" name="outJuros" id="outJuros" class="alinha-direita" readonly></p>
        <p>Total a pagar R$...: <input type="number" name="outTotal" id="outTotal" class="alinha-direita" readonly> <input type="reset" value="Nova Conta"></p>
    </form>
    <script src="js.js"></script>
</body>
</html>
