<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenda Avenida - promoção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Revenda Avenida - Promoção</h1>
    <form>
        <p>Modelo do Veículo: <input type="text" name="inModelo" id="inModelo" required autofocus></p>
        <p>Ano de fabricação: <input type="number" name="inAno" id="inAno" required></p>
        <p>Preço R$: <input type="number" name="inPreco" id="inPreco" min="0" step="0.01" required></p>
        <input type="submit" value="Classificar - Calcular Entrada e Parcelas">
    </form>
        <h3 id="outResp1"></h3>
        <h3 id="outResp2"></h3>
        <h3 id="outResp3"></h3>
    <script src="js.js"></script>
</body>
</html>
