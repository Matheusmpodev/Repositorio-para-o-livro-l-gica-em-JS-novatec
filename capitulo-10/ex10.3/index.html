<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <title> tabela filmes</title>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-4">
                <img src="" alt="">
            </div>
            <div class="col-sm-8">
                <h1>Mues fiilmes favoritos</h1>
                <form>
                    <p>
                        <label for="inTitulo">Título do Filme:</label>
                        <input type="text" name="inTitulo" id="inTitulo" class="form-control" required autofocus>
                    </p>
                    <p>
                        <label for="inGenero">Gênero:</label>
                        <input type="text" name="inGenero" id="inGenero" class="form-control" required>
                    </p>
                    <p>
                        <input type="submit" value="Adicionar" class="btn btn-primary float-right mb-3">
                    </p>
                </form>
                <table class="table table-striped">
                    <tr>
                        <th>Título do filme</th>
                        <th>Gênero</th>
                        <th>Ações</th>
                    </tr>
                </table>
            </div>

        </div>

    </div>
    <script src="js.js"></script>
</body>
</html>
