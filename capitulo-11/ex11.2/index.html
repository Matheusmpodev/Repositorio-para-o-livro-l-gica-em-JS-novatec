<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Reserva Poltranas</title>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-3">
                <img src="" alt="">
            </div>
            <div class="col-sm-9">
                <h1> Teatro: Show Musical - Reserva de Poltronas</h1>
                <form>
                    <div class="row">
                        <div class="col-sm-2">
                            <p><label for="inPoltrona">N° da Poltrona:</label><input type="number" name="inPoltrona" id="inPoltrona" class="form-control" min="1" required autofocus></p>
                        </div>
                        <div class="col-sm-4">
                            <input type="submit" value="Reservar" class="btn btn-primary mt-4">
                            <input type="button" value="Confirmar Reserva" class="btn btn-danger mt4" id="btConfirmar">
                        </div>
                        <div class="col-sm-6">
                            Legenda: 
                            <p class="mt-2"><img src="imagens/disponivel.jpg" alt="disponivel">Disponivel
                            <img src="imagens/reservada.jpg" alt="reservada">Reservada
                            <img src="imagens/ocupada.jpg" alt="ocupada">Ocupado
                            </p>
                        </div>
                    </div>
                </form>
                <div class="row">
                    <div class="col-sm-12" id="divPalco">
                        <p class="bg-primary text-white text-center"> Palco do Teatro</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js.js"></script>
</body>
</html>
